<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-6 Question-6</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding-top: 50px; 
            background-color: #f4f4f4; 
        }
        
        .converter-card {
            background: white;
            padding: 25px;
            width: 320px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { 
            text-align: center; 
            margin-bottom: 20px; 
            font-weight: bold; }
        label { 
            font-size: 14px; 
            color: #333; 
            display: block; 
            margin-top: 10px; 
        }
        
        input, select {
            margin: 8px 0;
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #000;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { opacity: 0.8; }
        </style>
        <script>
            const rates = {
                USD: { EUR: 0.93, GBP: 0.82, INR: 82.74, AUD: 1.47, USD: 1 },
                EUR: { USD: 1.08, GBP: 0.88, INR: 89.06, AUD: 1.58, EUR: 1 },
                GBP: { USD: 1.22, EUR: 1.14, INR: 101.5, AUD: 1.80, GBP: 1 },
                INR: { USD: 0.012, EUR: 0.011, GBP: 0.0098, AUD: 0.018, INR: 1 },
                AUD: { USD: 0.68, EUR: 0.63, GBP: 0.56, INR: 56.30, AUD: 1 } 
            };
    
            function convertCurrency() {
                const amount = document.getElementById("amount").value;
                const from = document.getElementById("fromCurrency").value;
                const to = document.getElementById("toCurrency").value;
                const resultBox = document.getElementById("resultInput");
    
                if (amount === "" || amount < 0) {
                    alert("Please enter a valid amount");
                    return;
                }
    
                const rate = rates[from][to];
                const convertedValue = (amount * rate).toFixed(2);
    

                resultBox.value = convertedValue;
            }
        </script>
</head>
<body>
    <div class="converter-card">
        <h2>Currency Converter</h2>

        <select id="fromCurrency">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="INR">INR</option>
            <option value="AUD">AUD</option>
        </select>

        <input type="number" id="amount" value="1000">

        <label>To:</label>
        <select id="toCurrency">
            <option value="INR" selected>INR</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="AUD">AUD</option>
        </select>

        <input type="text" id="resultInput" placeholder="Converted amount" readonly>
        <button onclick="convertCurrency()">Convert</button>
    </div>
</body>
</html>
