<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-6 Question-3</title>
    <script language="JavaScript">
        function changeBg(color){
            if (confirm('Do you really want to change the background to ${color}?')){
                document.getElementById('color-box').style.backgroundColor = color;
            }
        }
    </script>
</head>
<body>
    <div id="color-box" style="width: 200px; height: 100px; border: 1px solid #000; margin-bottom: 10px;">
        Color Box
    </div>
    <button onclick="changeBg('red')">Red</button>
    <button onclick="changeBg('green')">Green</button>
    <button onclick="changeBg('yellow')">Yellow</button>
</body>
</html>
