<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-6 Question-5</title>
    <script>
        function checkPrime(event) {
            const n = parseInt(document.getElementById("num-input").value);
            if (n <= 1) return alert(n + " is not a prime number.");
    
            let isPrime = true;
            for (let i = 2; i <= Math.sqrt(n); i++) {
                if (n % i === 0) {
                    isPrime = false;
                    break;
                 }
            }
             alert(isPrime ? n + " is a prime number!" : n + " is not a prime number.");
        }
    </script>
</head>
<body>
    <input type="number" id="num-input" placeholder="Enter a number">
    <button onclick="checkPrime()">Check Prime</button>
</body>
</html>
