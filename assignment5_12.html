<!DOCTYPE html>
<html>
<head>
    <title>Q12</title>
    <script language="Javascript">
        function getFibonacci(limit){
            if (limit<=0) return [];
            if(limit == 1) return [0];
            let fib = [0, 1];
            for (let i = 2; i < limit; i++){
                fib[i] = fib[i-1] + fib[i-2];
            }
            return fib;
        }
        const result = getFibonacci(10);
        console.log(result); 
    </script>
    <body bgcolor="pink" text="green"></body>
</html>
